Content-type: text/html

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>$title$</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 2em; }
        .metadata { color: #666; font-size: 0.9em; border-bottom: 1px solid #ccc; margin-bottom: 20px; }
        .tags { display: inline-block; background: #eee; padding: 2px 8px; border-radius: 4px; margin-right: 5px; }
	.footer { color: #666; font-size: 0.9em; border-top: 1px solid #ccc; margin-top: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>
<body>

    <header>
        <h1>$title$</h1>
        <div class="metadata">
            <div>
                $for(keywords)$
                <span class="tags">$keywords$</span>
                $endfor$
            </div>
        </div>
    </header>

    <main>
        $body$
    </main>
    <div class="footer">Copyright (C) 公開日: $date$ 著者: $author$</div>

</body>
</html>
